<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Horse Bets</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;0,700;1,300&display=swap" rel="stylesheet">
<style>
  /* ── Reset & Base ─────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0f14;
    --surface:   #13161e;
    --card:      #181c27;
    --border:    #252a38;
    --border2:   #2e3448;
    --gold:      #c9a84c;
    --gold-dim:  #8a6f2e;
    --gold-glow: rgba(201,168,76,0.15);
    --blue:      #4a7cdc;
    --blue-dim:  rgba(74,124,220,0.12);
    --green:     #3db882;
    --red:       #e05252;
    --text:      #e8e4da;
    --text-muted:#7a8099;
    --text-dim:  #60c596; /* #4a5068 */
    --mono:      'DM Mono', monospace;
    --serif:     'Fraunces', Georgia, serif;
  }

  html { font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background texture ───────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(201,168,76,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(74,124,220,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ───────────────────────────────────────────────────── */
  .wrap {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ── Header ───────────────────────────────────────────────────── */
  header {
    margin-bottom: 44px;
  }

  .eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .eyebrow::before {
    content: '';
    display: inline-block;
    width: 24px;
    height: 1px;
    background: var(--gold);
  }

  h1 {
    font-family: var(--serif);
    font-size: clamp(2.2rem, 5vw, 3.2rem);
    font-weight: 700;
    color: var(--text);
    line-height: 1.05;
    letter-spacing: -0.02em;
  }

  h1 em {
    font-style: italic;
    font-weight: 300;
    color: var(--gold);
  }

  .tagline {
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.03em;
    line-height: 1.6;
  }

  /* ── Section labels ───────────────────────────────────────────── */
  .section-label {
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Outcome toggle ───────────────────────────────────────────── */
  .outcome-row {
    display: flex;
    gap: 10px;
    margin-bottom: 32px;
  }

  .outcome-btn {
    flex: 1;
    padding: 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.18s ease;
    position: relative;
    overflow: hidden;
  }

  .outcome-btn .ob-label { display: block; margin-bottom: 2px; }
  .outcome-btn .ob-sub   { font-size: 9px; color: var(--text-dim); letter-spacing: 0.08em; }

  .outcome-btn:hover {
    border-color: var(--border2);
    color: var(--text);
  }

  .outcome-btn.active-yes {
    border-color: var(--green);
    background: rgba(61,184,130,0.08);
    color: var(--green);
    box-shadow: 0 0 20px rgba(61,184,130,0.1);
  }

  .outcome-btn.active-yes .ob-sub { color: rgba(61,184,130,0.6); }

  .outcome-btn.active-no {
    border-color: var(--red);
    background: rgba(224,82,82,0.08);
    color: var(--red);
    box-shadow: 0 0 20px rgba(224,82,82,0.1);
  }

  .outcome-btn.active-no .ob-sub { color: rgba(224,82,82,0.6); }

  /* ── Participant cards ────────────────────────────────────────── */
  #participants {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }

  .participant {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 18px;
    display: grid;
    grid-template-columns: 1fr 110px 110px 32px;
    gap: 10px;
    align-items: center;
    transition: border-color 0.2s ease;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .participant:focus-within {
    border-color: var(--border2);
  }

  .participant.has-error {
    border-color: rgba(224,82,82,0.4);
  }

  /* ── Inputs ───────────────────────────────────────────────────── */
  .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .field-label {
    font-size: 8px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  input[type="text"],
  input[type="number"] {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 4px 0;
    width: 100%;
    outline: none;
    transition: border-color 0.15s ease;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  input::placeholder { color: var(--text-dim); }

  input:focus {
    border-bottom-color: var(--gold);
  }

  .prob-wrap {
    position: relative;
  }

  .prob-wrap input { padding-right: 16px; }

  .prob-unit {
    position: absolute;
    right: 0;
    bottom: 5px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .stake-wrap { position: relative; }
  .stake-wrap input { padding-left: 12px; }
  .stake-unit {
    position: absolute;
    left: 0;
    bottom: 5px;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* ── Remove button ────────────────────────────────────────────── */
  .remove-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    line-height: 1;
    padding-bottom: 1px;
    align-self: flex-end;
    margin-bottom: 3px;
  }

  .remove-btn:hover {
    border-color: var(--red);
    color: var(--red);
    background: rgba(224,82,82,0.08);
  }

  /* ── Add person button ────────────────────────────────────────── */
  #add-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.18s ease;
    width: 100%;
    margin-bottom: 36px;
  }

  #add-btn:hover {
    border-color: var(--gold-dim);
    color: var(--gold);
    background: var(--gold-glow);
  }

  .plus-icon {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1px solid currentColor;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    line-height: 1;
    flex-shrink: 0;
    padding-bottom: 1px;
  }

  /* ── Results panel ────────────────────────────────────────────── */
  #results {
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
  }

  #results.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  /* ── Stats bar ────────────────────────────────────────────────── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
  }

  .stat-label {
    font-size: 8px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 18px;
    font-family: var(--serif);
    font-weight: 600;
    color: var(--text);
  }

  .stat-value.gold { color: var(--gold); }

  /* ── Results table ────────────────────────────────────────────── */
  .results-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .results-table th {
    font-size: 8px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-weight: 400;
  }

  .results-table th:not(:first-child) { text-align: right; }

  .results-table td {
    padding: 11px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  .results-table td:not(:first-child) { text-align: right; }

  .results-table tr:last-child td { border-bottom: none; }

  .results-table tr { transition: background 0.12s ease; }
  .results-table tr:hover td { background: rgba(255,255,255,0.02); }

  .name-cell {
    font-weight: 500;
    color: var(--text);
    font-size: 13px;
  }

  .prob-cell { color: var(--text-muted); }

  .score-cell {
    color: var(--text-muted);
    font-size: 11px;
  }

  .transfer-cell {
    font-weight: 500;
  }

  .transfer-pos { color: var(--green); }
  .transfer-neg { color: var(--red); }
  .transfer-zero { color: var(--text-dim); }

  .payout-cell {
    font-size: 14px;
    font-family: var(--serif);
    font-weight: 600;
    color: var(--text);
  }

  .rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    font-size: 9px;
    margin-right: 6px;
    font-family: var(--mono);
    vertical-align: middle;
  }

  .rank-1 { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid var(--gold-dim); }
  .rank-2 { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--border2); }
  .rank-3 { background: rgba(255,255,255,0.03); color: var(--text-dim); border: 1px solid var(--border); }

  /* ── Transfer summary ─────────────────────────────────────────── */
  .transfers-box {
    margin-top: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 18px 20px;
  }

  .transfers-title {
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  .transfer-line {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .transfer-line:last-child { border-bottom: none; }

  .tl-from { color: var(--red); font-weight: 500; }
  .tl-arrow { color: var(--text-dim); font-size: 10px; flex-shrink: 0; }
  .tl-to   { color: var(--green); font-weight: 500; }
  .tl-amount {
    margin-left: auto;
    font-family: var(--serif);
    font-weight: 600;
    font-size: 14px;
    color: var(--text);
    white-space: nowrap;
  }

  .no-transfers {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    padding: 8px 0;
  }

  /* ── Warning box ──────────────────────────────────────────────── */
  .warning-box {
    margin-top: 14px;
    padding: 12px 14px;
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 4px;
    font-size: 11px;
    color: rgba(201,168,76,0.8);
    line-height: 1.5;
    display: none;
  }

  .warning-box.show { display: block; }

  /* ── Pending state ────────────────────────────────────────────── */
  .pending-msg {
    text-align: center;
    padding: 32px;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.08em;
    line-height: 1.8;
  }

  /* ── Table container ──────────────────────────────────────────── */
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  /* ── Responsive ───────────────────────────────────────────────── */
  @media (max-width: 560px) {
    .participant {
      grid-template-columns: 1fr 90px 90px 28px;
      gap: 8px;
      padding: 14px;
    }

    .stats-bar { grid-template-columns: 1fr 1fr; }
    .stats-bar .stat:last-child { grid-column: span 2; }

    .results-table th:nth-child(3),
    .results-table td:nth-child(3) { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <header>
    <div class="eyebrow">Probability Pool Calculator</div>
    <h1>Blue Horse <em>Bets</em></h1>
    <p class="tagline">Enter each person's probability and stake. Results calculate automatically.<br>Not YES/NO bets but confidence levels.<br> - Created by Ethan Campbell</p>
  </header>

  <!-- Outcome -->
  <div class="section-label">Event Outcome</div>
  <div class="outcome-row">
    <button class="outcome-btn" id="btn-yes" onclick="setOutcome(1)">
      <span class="ob-label">Event Happened</span>
      <span class="ob-sub">y = 1 &nbsp;:&nbsp; high probabilities win</span>
    </button>
    <button class="outcome-btn" id="btn-no" onclick="setOutcome(0)">
      <span class="ob-label">Event Did Not Happen</span>
      <span class="ob-sub">y = 0 &nbsp;:&nbsp; low probabilities win</span>
    </button>
  </div>

  <!-- Participants -->
  <div class="section-label">Participants</div>
  <div id="participants"></div>

  <button id="add-btn" onclick="addParticipant()">
    <span class="plus-icon">+</span>
    Add person
  </button>

  <!-- Results -->
  <div class="section-label">Results</div>
  <div id="results">
    <div id="results-inner"></div>
  </div>

</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let outcome = null;  // 1 or 0
let nextId  = 0;
let ids     = [];

// ── Init ───────────────────────────────────────────────────────────────────
addParticipant();
addParticipant();
addParticipant();
renderResults();

// ── Outcome ────────────────────────────────────────────────────────────────
function setOutcome(val) {
  outcome = val;
  document.getElementById('btn-yes').className =
    'outcome-btn' + (val === 1 ? ' active-yes' : '');
  document.getElementById('btn-no').className =
    'outcome-btn' + (val === 0 ? ' active-no' : '');
  renderResults();
}

// ── Participants ───────────────────────────────────────────────────────────
function addParticipant() {
  const id = nextId++;
  ids.push(id);

  const div = document.createElement('div');
  div.className = 'participant';
  div.id = `p-${id}`;
  div.innerHTML = `
    <div class="field">
      <div class="field-label">Name</div>
      <input type="text" id="name-${id}" placeholder="Player ${id + 1}"
        oninput="renderResults()" autocomplete="off" spellcheck="false">
    </div>
    <div class="field">
      <div class="field-label">Probability</div>
      <div class="prob-wrap">
        <input type="number" id="prob-${id}" placeholder="65" min="1" max="99" step="1"
          oninput="clampProb(${id}); renderResults()">
        <span class="prob-unit">%</span>
      </div>
    </div>
    <div class="field">
      <div class="field-label">Stake</div>
      <div class="stake-wrap">
        <span class="stake-unit">$</span>
        <input type="number" id="stake-${id}" placeholder="100" min="0.01" step="any"
          oninput="renderResults()">
      </div>
    </div>
    <button class="remove-btn" onclick="removeParticipant(${id})" title="Remove">×</button>
  `;

  document.getElementById('participants').appendChild(div);

  // focus name of new row (not on init rows)
  if (nextId > 3) {
    setTimeout(() => document.getElementById(`name-${id}`).focus(), 50);
  }
}

function removeParticipant(id) {
  if (ids.length <= 2) return; // keep at least 2
  ids = ids.filter(i => i !== id);
  document.getElementById(`p-${id}`).remove();
  renderResults();
}

function clampProb(id) {
  const el = document.getElementById(`prob-${id}`);
  let v = parseFloat(el.value);
  if (!isNaN(v)) {
    if (v < 1)  el.value = 1;
    if (v > 99) el.value = 99;
  }
}

// ── Math ───────────────────────────────────────────────────────────────────
function getParticipants() {
  return ids.map(id => {
    const name  = (document.getElementById(`name-${id}`).value.trim()) || `Player ${id + 1}`;
    const probV = parseFloat(document.getElementById(`prob-${id}`).value);
    const stakeV= parseFloat(document.getElementById(`stake-${id}`).value);
    return {
      id,
      name,
      prob:  isNaN(probV)  ? null : probV / 100,
      stake: isNaN(stakeV) ? null : stakeV,
      valid: !isNaN(probV) && !isNaN(stakeV) && probV >= 1 && probV <= 99 && stakeV > 0,
    };
  });
}

function median(arr) {
  const s = [...arr].sort((a,b) => a - b);
  const m = Math.floor(s.length / 2);
  return s.length % 2 !== 0 ? s[m] : (s[m-1] + s[m]) / 2;
}

function calcPayouts(players, y) {
  // ─────────────────────────────
  // 1. Log scores
  // ─────────────────────────────
  players.forEach(p => {
    const eps = 1e-12; // stability guard
    const prob = Math.min(0.99, Math.max(0.01, p.prob));

    p.ls = y === 1
      ? Math.log(prob + eps)
      : Math.log(1 - prob + eps);
  });

  // ─────────────────────────────
  // 2. Median score
  // ─────────────────────────────
  const med = median(players.map(p => p.ls));

  players.forEach(p => {
    p.delta = p.ls - med;
  });

  // ─────────────────────────────
  // 3. Dead market (all equal)
  // ─────────────────────────────
  const allSame = players.every(p => Math.abs(p.delta) < 1e-12);
  if (allSame) {
    players.forEach(p => {
      p.transfer = 0;
      p.payout = p.stake;
      p.dead = true;
    });
    return { players, med, dead: true, capped: false };
  }

  // ─────────────────────────────
  // 4. Weights (your design)
  // ─────────────────────────────
  players.forEach(p => {
    p.weight = Math.sqrt(p.stake) * Math.sign(p.delta) * Math.exp(k * Math.abs(p.delta));  });
  const winners = players.filter(p => p.weight > 0);
  const losers  = players.filter(p => p.weight < 0);

  const Wpos = winners.reduce((s,p) => s + p.weight, 0);
  const Wneg = losers.reduce((s,p) => s + Math.abs(p.weight), 0);

  // ─────────────────────────────
  // 5. GLOBAL SAFETY SCALE (THIS FIXES EVERYTHING)
  // ─────────────────────────────
  // ensures no loser pays more than stake

  let k = Infinity;

  losers.forEach(p => {
    if (p.weight !== 0) {
      k = Math.min(k, p.stake / Math.abs(p.weight));
    }
  });

  // if no constraint, allow full scale
  if (!isFinite(k)) k = 0;

  // clamp to 1 so we don't over-amplify
  k = Math.min(k, 1);

  // ─────────────────────────────
  // 6. Apply transfers (SINGLE PASS, NO ITERATION)
  // ─────────────────────────────
  players.forEach(p => {
    p.transfer = k * p.weight;
  });

  // ─────────────────────────────
  // 7. Conservation check split
  // ─────────────────────────────
  const totalCollected = players
    .filter(p => p.transfer < 0)
    .reduce((s,p) => s + Math.abs(p.transfer), 0);

  const totalPaid = players
    .filter(p => p.transfer > 0)
    .reduce((s,p) => s + p.transfer, 0);

  // normalize tiny floating error (optional safety)
  const fix = totalPaid - totalCollected;

  if (Math.abs(fix) > 1e-8 && winners.length > 0) {
    winners[0].transfer -= fix;
  }

  // ─────────────────────────────
  // 8. Final payouts
  // ─────────────────────────────
  players.forEach(p => {
    p.payout = p.stake + p.transfer;

    // absolute safety floor (should never trigger now)
    if (p.payout < 0) p.payout = 0;
  });

  return { players, med, dead: false, capped: (k < 1) };
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderResults() {
  const all   = getParticipants();
  const valid = all.filter(p => p.valid);
  const inner = document.getElementById('results-inner');
  const panel = document.getElementById('results');

  // Highlight invalid rows
  all.forEach(p => {
    const row = document.getElementById(`p-${p.id}`);
    if (row) row.classList.toggle('has-error', !p.valid && (
      document.getElementById(`prob-${p.id}`).value !== '' ||
      document.getElementById(`stake-${p.id}`).value !== ''
    ));
  });

  // Need outcome + at least 2 valid players
  if (outcome === null || valid.length < 2) {
    panel.classList.remove('visible');
    inner.innerHTML = `<div class="pending-msg">
      ${outcome === null ? 'Select an outcome above' : 'Enter at least 2 valid participants'}
      <br><span style="font-size:10px;color:var(--text-dim)">Results appear automatically</span>
    </div>`;
    panel.classList.add('visible');
    return;
  }

  const { players, dead, capped } = calcPayouts(valid.map(p => ({...p})), outcome);

  // Sort by payout desc for ranking
  const ranked = [...players].sort((a,b) => b.payout - a.payout);

  // Stats
  const totalPool = players.reduce((s,p) => s + p.stake, 0);
  const allSame   = players.every(p => Math.abs(p.prob - players[0].prob) < 1e-6);
  const wAvgProb  = players.reduce((s,p) => s + p.prob * Math.sqrt(p.stake), 0) /
                    players.reduce((s,p) => s + Math.sqrt(p.stake), 0);
  const totalMoved = players.filter(p=>p.transfer>0).reduce((s,p)=>s+p.transfer,0);

  // Build HTML
  let html = `
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-label">Total Pool</div>
        <div class="stat-value gold">${fmt(totalPool)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Players</div>
        <div class="stat-value">${players.length}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Implied Probability</div>
        <div class="stat-value">${(wAvgProb * 100).toFixed(1)}%</div>
      </div>
    </div>

    <div class="table-wrap">
      <table class="results-table">
        <thead>
          <tr>
            <th>Player</th>
            <th>Probability</th>
            <th>Log Score</th>
            <th>Transfer</th>
            <th>Payout</th>
          </tr>
        </thead>
        <tbody>
  `;

  ranked.forEach((p, i) => {
    const rank = i + 1;
    const badge = rank <= 3
      ? `<span class="rank-badge rank-${rank}">${rank}</span>`
      : `<span style="display:inline-block;width:24px;color:var(--text-dim);font-size:10px;margin-right:2px;text-align:center">${rank}</span>`;

    const tClass = p.transfer > 0.005
      ? 'transfer-cell transfer-pos'
      : p.transfer < -0.005
        ? 'transfer-cell transfer-neg'
        : 'transfer-cell transfer-zero';

    const tText = p.transfer > 0.005
      ? `+${fmt(p.transfer)}`
      : p.transfer < -0.005
        ? `−${fmt(Math.abs(p.transfer))}`
        : '—';

    html += `
      <tr>
        <td class="name-cell">${badge}${esc(p.name)}</td>
        <td class="prob-cell">${(p.prob * 100).toFixed(0)}%</td>
        <td class="score-cell">${p.ls.toFixed(3)}</td>
        <td class="${tClass}">${tText}</td>
        <td class="payout-cell">${fmt(p.payout)}</td>
      </tr>
    `;
  });

  html += `</tbody></table></div>`;

  // Transfer instructions
  html += `<div class="transfers-box"><div class="transfers-title">Who Pays Who</div>`;

  if (dead || allSame) {
    html += `<div class="no-transfers">Everyone submitted the same probability — no money changes hands. All stakes returned.</div>`;
  } else {
    const losersS  = players.filter(p => p.transfer < -0.005)
                            .sort((a,b) => a.transfer - b.transfer);
    const winnersS = players.filter(p => p.transfer >  0.005)
                            .sort((a,b) => b.transfer - a.transfer);

    if (losersS.length === 0) {
      html += `<div class="no-transfers">No transfers calculated.</div>`;
    } else {
      // Simplified: pair biggest loser with biggest winner etc.
      // Just show each loser paying into the pool and each winner receiving
      losersS.forEach(loser => {
        winnersS.forEach(winner => {
          // Show proportional transfer from this loser to this winner
          const frac = winner.transfer / (winnersS.reduce((s,w)=>s+w.transfer,0) || 1);
          const amt  = Math.abs(loser.transfer) * frac;
          if (amt < 0.005) return;
          html += `
            <div class="transfer-line">
              <span class="tl-from">${esc(loser.name)}</span>
              <span class="tl-arrow">——▶</span>
              <span class="tl-to">${esc(winner.name)}</span>
              <span class="tl-amount">${fmt(amt)}</span>
            </div>`;
        });
      });
    }
  }

  html += `</div>`;

  // Warnings
  if (capped) {
    html += `<div class="warning-box show">⚠ Loss cap applied — one or more players' computed loss exceeded their stake. Their loss was capped at their full stake and the remainder redistributed.</div>`;
  }

  inner.innerHTML = html;
  panel.classList.add('visible');
}

// ── Helpers ────────────────────────────────────────────────────────────────
function fmt(n) {
  return '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
