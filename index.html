<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Horse Bets</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;0,700;1,300&display=swap" rel="stylesheet">

<style>
/* ───────────────────────────────
   BASE
─────────────────────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #0d0f14;
  --surface: #13161e;
  --card: #181c27;
  --border: #252a38;
  --text: #e8e4da;
  --text-dim: #7a8099;
  --green: #3db882;
  --red: #e05252;
  --gold: #c9a84c;
  --mono: 'DM Mono', monospace;
  --serif: 'Fraunces', serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  padding: 40px;
}

/* ───────────────────────────────
   LAYOUT
─────────────────────────────── */
.wrap {
  max-width: 800px;
  margin: auto;
}

h1 {
  font-family: var(--serif);
  margin-bottom: 20px;
}

.section-label {
  margin: 20px 0 10px;
  color: var(--text-dim);
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ───────────────────────────────
   OUTCOME BUTTONS
─────────────────────────────── */
.outcome-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.outcome-btn {
  flex: 1;
  padding: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
}

.active-yes {
  border-color: var(--green);
  color: var(--green);
}

.active-no {
  border-color: var(--red);
  color: var(--red);
}

/* ───────────────────────────────
   PARTICIPANTS
─────────────────────────────── */
.participant {
  display: grid;
  grid-template-columns: 1fr 120px 120px 30px;
  gap: 10px;
  padding: 10px;
  background: var(--card);
  border: 1px solid var(--border);
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 6px;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}

.remove-btn {
  background: none;
  border: none;
  color: var(--red);
  font-size: 18px;
  cursor: pointer;
}

/* ───────────────────────────────
   RESULTS
─────────────────────────────── */
#results {
  margin-top: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  padding: 8px;
  border-bottom: 1px solid var(--border);
  text-align: left;
}

th {
  color: var(--text-dim);
}
</style>
</head>

<body>
<div class="wrap">

<h1>Blue Horse Bets</h1>

<div class="section-label">Outcome</div>
<div class="outcome-row">
  <button class="outcome-btn" id="yesBtn" onclick="setOutcome(1)">YES</button>
  <button class="outcome-btn" id="noBtn" onclick="setOutcome(0)">NO</button>
</div>

<div class="section-label">Participants</div>
<div id="participants"></div>

<button onclick="addParticipant()">+ Add Person</button>

<div class="section-label">Results</div>
<div id="results"></div>

</div>

<script>

// ───────────────────────────────
// STATE
// ───────────────────────────────
let outcome = null;
let ids = [];
let nextId = 0;

// ───────────────────────────────
// INIT
// ───────────────────────────────
addParticipant();
addParticipant();
addParticipant();
render();

// ───────────────────────────────
// UI
// ───────────────────────────────
function setOutcome(v) {
  outcome = v;

  document.getElementById('yesBtn').className =
    'outcome-btn' + (v === 1 ? ' active-yes' : '');

  document.getElementById('noBtn').className =
    'outcome-btn' + (v === 0 ? ' active-no' : '');

  render();
}

function addParticipant() {
  const id = nextId++;
  ids.push(id);

  const div = document.createElement('div');
  div.className = 'participant';
  div.id = `p-${id}`;

  div.innerHTML = `
    <input id="name-${id}" placeholder="Name" oninput="render()">
    <input id="prob-${id}" placeholder="Prob %" type="number" oninput="render()">
    <input id="stake-${id}" placeholder="Stake" type="number" oninput="render()">
    <button class="remove-btn" onclick="removeParticipant(${id})">×</button>
  `;

  document.getElementById('participants').appendChild(div);
}

function removeParticipant(id) {
  ids = ids.filter(x => x !== id);
  document.getElementById(`p-${id}`).remove();
  render();
}

// ───────────────────────────────
// DATA
// ───────────────────────────────
function getPlayers() {
  return ids.map(id => {
    const prob = parseFloat(document.getElementById(`prob-${id}`).value);
    const stake = parseFloat(document.getElementById(`stake-${id}`).value);
    const name = document.getElementById(`name-${id}`).value || `P${id}`;

    return {
      name,
      prob: prob / 100,
      stake,
      valid: !isNaN(prob) && !isNaN(stake)
    };
  }).filter(p => p.valid);
}

// ───────────────────────────────
// SOFTMAX ENGINE
// ───────────────────────────────
function softmax(players, y, beta = 10) {

  const total = players.reduce((s,p) => s + p.stake, 0);

  players.forEach(p => {
    const err = p.prob - y;
    p.u = 1 - err * err;
  });

  let weights = players.map(p => {
    return p.stake * Math.exp(beta * p.u);
  });

  const sum = weights.reduce((a,b) => a + b, 0);

  players.forEach((p,i) => {
    p.payout = total * (weights[i] / sum);
    p.delta = p.payout - p.stake;
  });

  return players;
}

// ───────────────────────────────
// RENDER
// ───────────────────────────────
function render() {

  const players = getPlayers();

  if (outcome === null || players.length < 2) {
    document.getElementById('results').innerHTML =
      '<p>Set outcome + add players</p>';
    return;
  }

  const result = softmax(players, outcome);

  let html = `
    <table>
      <tr>
        <th>Name</th>
        <th>Prob</th>
        <th>Score</th>
        <th>P/L</th>
        <th>Payout</th>
      </tr>
  `;

  result.forEach(p => {
    html += `
      <tr>
        <td>${p.name}</td>
        <td>${(p.prob*100).toFixed(1)}%</td>
        <td>${p.u.toFixed(3)}</td>
        <td>${p.delta.toFixed(2)}</td>
        <td>${p.payout.toFixed(2)}</td>
      </tr>
    `;
  });

  html += '</table>';

  document.getElementById('results').innerHTML = html;
}

</script>

</body>
</html>
